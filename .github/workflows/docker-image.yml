name: Docker Push

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Also tag as latest'
        type: boolean
        default: false
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version info
        id: version
        run: |
          # Определяем версию из тега или ветки
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG=${GITHUB_REF_NAME}
          else
            # Для веток используем короткий хеш коммита
            TAG=$(git rev-parse --short HEAD)
          fi
          
          REV=$(git rev-parse --short HEAD)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "rev=${REV}" >> $GITHUB_OUTPUT
          echo "full=${TAG}-${REV}" >> $GITHUB_OUTPUT
          
          # Извлекаем major.minor версию (например, v1.2.5 -> 1.2)
          if [[ $TAG =~ ^v([0-9]+\.[0-9]+)\. ]]; then
            echo "minor=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          elif [[ $TAG =~ ^([0-9]+\.[0-9]+)\. ]]; then
            echo "minor=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "minor=${TAG}" >> $GITHUB_OUTPUT
          fi
          
          # Проверяем, находится ли текущий коммит на master/main ветке
          IS_MASTER="false"
          if git branch -r --contains HEAD | grep -q -E 'origin/(master|main)'; then
            IS_MASTER="true"
            echo "Current commit is on master/main branch"
          else
            echo "Current commit is NOT on master/main branch"
          fi
          
          # Определяем, нужно ли пушить latest тег
          PUSH_LATEST="${{ github.event.inputs.push_latest }}"
          if [ "$PUSH_LATEST" = "true" ] || [ "$IS_MASTER" = "true" ]; then
            echo "push_latest=true" >> $GITHUB_OUTPUT
            echo "Will push 'latest' tag (master=${IS_MASTER}, manual=${PUSH_LATEST})"
          else
            echo "push_latest=false" >> $GITHUB_OUTPUT
            echo "Will NOT push 'latest' tag"
          fi

      - name: Create version.json (optional)
        run: |
          # Создаем файл с информацией о версии, если нужен
          mkdir -p app 2>/dev/null || true
          cat > app/version.json << EOF
          {
              "version": "${{ steps.version.outputs.full }}",
              "commitSha": "${{ github.sha }}",
              "releaseUrl": "https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}",
              "buildDate": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF
          # Если файл создан, покажем его
          if [ -f app/version.json ]; then
            echo "Version file created:"
            cat app/version.json
          fi

      - name: Lint check scripts
        run: |
          # Проверяем синтаксис bash скриптов
          for script in *.sh entrypoint.sh usr/local/sbin/*.sh 2>/dev/null; do
            if [ -f "$script" ]; then
              echo "Checking $script"
              bash -n "$script"
            fi
          done

      - name: Build and test image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: mobile443-test:latest
          cache-from: type=gha,scope=mobile443
          cache-to: type=gha,mode=max,scope=mobile443

      - name: Run basic tests
        run: |
          # Проверяем, что образ собирается и основные скрипты доступны
          docker run --rm --entrypoint /bin/sh mobile443-test:latest -c "test -f /usr/local/sbin/mobile443-common.sh && echo '✓ common.sh exists'"
          docker run --rm --entrypoint /bin/sh mobile443-test:latest -c "test -f /usr/local/sbin/mobile443-update.sh && echo '✓ update.sh exists'"
          docker run --rm --entrypoint /bin/sh mobile443-test:latest -c "test -f /usr/local/sbin/mobile443-apply-cache.sh && echo '✓ apply-cache.sh exists'"
          docker run --rm --entrypoint /bin/sh mobile443-test:latest -c "test -f /opt/mobile443/asns.conf && echo '✓ asns.conf exists'"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mobile443-docker:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/mobile443-docker:${{ steps.version.outputs.minor }}
            ${{ steps.version.outputs.push_latest == 'true' && format('{0}/mobile443-docker:latest', secrets.DOCKERHUB_USERNAME) || '' }}
          cache-from: type=gha,scope=mobile443
          cache-to: type=gha,mode=max,scope=mobile443

      - name: Update Docker Hub Description
        if: steps.version.outputs.push_latest == 'true'
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/mobile443-docker
          short-description: "🇷🇺 Фильтрация порта 443 для трафика только из мобильных сетей РФ"
          readme-filepath: ./README.md
