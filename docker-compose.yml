version: '3.8'

services:
  mobile443:
    image: vbiosrv/mobile443-docker:latest
    container_name: mobile443-filter
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      # Монтируем состояние для сохранения префиксов
      - mobile443-state:/var/lib/mobile443
      # Монтируем конфигурацию ASN для редактирования (опционально)
      - ./asns.conf:/opt/mobile443/asns.conf:ro
    environment:
      - TZ=Europe/Moscow
      - UPDATE_SCHEDULE=0 0 * * *
      - LOG_LEVEL=info
      - FORCE_UPDATE_ON_START=false
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

volumes:
  mobile443-state:
    driver: local
